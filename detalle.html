<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programa | APEX Sim Racing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,700;1,900&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>

/* ══════════════════════════════
   DETALLE — BASE
══════════════════════════════ */
.det-page{
  min-height:100vh;
  background:var(--black);
  padding-top:80px;
  overflow-x:hidden;
}

/* Barra de color del nivel — color seteado por JS */
.det-level-bar{
  width:100%;
  height:3px;
}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
.det-header{
  padding:4rem 3rem 3rem;
  border-bottom:1px solid #e0e0e0;
  position:relative;
  overflow:hidden;
  display:grid;
  grid-template-columns:1fr 520px;
  gap:3rem;
  align-items:center;
  background:#ffffff;  /* fondo blanco */
}
.det-header-left{ display:flex; flex-direction:column }

/* ── FOTO CON HUD ── */
.det-header-img{
  position:relative;
  width:100%;
  aspect-ratio:3/2.2;   /* más alto, más imponente */
  overflow:hidden;
  border:1px solid rgba(0,255,136,.08);
  flex-shrink:0;
}
.det-header-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  filter:saturate(.85) brightness(.9);
}
/* Overlay oscuro en degradado */
.det-header-img::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(5,5,5,.55) 0%, transparent 60%, rgba(5,5,5,.35) 100%);
  pointer-events:none;
}
/* Brackets en esquinas — igual que el hero */
.det-img-bracket{
  position:absolute;
  width:16px;
  height:16px;
  z-index:2;
  pointer-events:none;
}
.det-img-bracket.tl{ top:10px; left:10px; border-top:1.5px solid var(--prog-accent,var(--green)); border-left:1.5px solid var(--prog-accent,var(--green)); }
.det-img-bracket.tr{ top:10px; right:10px; border-top:1.5px solid var(--prog-accent,var(--green)); border-right:1.5px solid var(--prog-accent,var(--green)); }
.det-img-bracket.bl{ bottom:10px; left:10px; border-bottom:1.5px solid var(--violet); border-left:1.5px solid var(--violet); }
.det-img-bracket.br{ bottom:10px; right:10px; border-bottom:1.5px solid var(--violet); border-right:1.5px solid var(--violet); }
/* HUD overlay — igual estética que foto1 */
.det-img-hud{
  position:absolute;
  top:.8rem;
  left:.8rem;
  right:.8rem;
  z-index:3;
  display:flex;
  flex-direction:column;
  gap:.35rem;
  pointer-events:none;
}
.det-hud-row{
  display:flex;
  justify-content:space-between;
  font-family:var(--ff-mono);
  font-size:.52rem;
  color:rgba(242,242,242,.45);
}
.det-hud-val{ color:var(--prog-accent, var(--green)) }
.det-hud-val.v{ color:var(--violet) }
/* Barra RPM lateral */
.det-img-rpm{
  position:absolute;
  right:8px;
  top:10%;
  height:80%;
  width:4px;
  background:#111;
  border-radius:2px;
  overflow:hidden;
  z-index:3;
}
.det-img-rpm-fill{
  width:100%;
  background:linear-gradient(to top, var(--prog-accent, var(--green)), var(--violet));
  border-radius:2px;
  animation:rpmPulse 1.8s ease-in-out infinite alternate;
}
/* REC badge */
.det-img-rec{
  position:absolute;
  top:.8rem;
  right:1.4rem;
  z-index:3;
  font-family:var(--ff-mono);
  font-size:.48rem;
  letter-spacing:.15em;
  color:rgba(242,242,242,.6);
  display:flex;
  align-items:center;
  gap:.3rem;
}
.det-img-rec::before{
  content:'';
  width:5px;
  height:5px;
  border-radius:50%;
  background:#ff3333;
  display:inline-block;
  animation:blink 1.2s infinite;
  box-shadow:0 0 6px rgba(255,51,51,.7);
}

.det-back{
  font-family:var(--ff-mono);
  font-size:.68rem;          /* más grande */
  letter-spacing:.2em;
  text-transform:uppercase;
  color:#888;                /* visible sobre blanco */
  display:inline-flex;
  align-items:center;
  gap:.5rem;
  margin-bottom:2.5rem;
  transition:color .2s;
}
.det-back:hover{ color:var(--prog-accent, var(--green)) }
.det-back::before{ content:'←'; color:var(--prog-accent, var(--green)) }

.det-eyebrow{
  font-family:var(--ff-mono);
  font-size:.75rem;          /* más grande */
  letter-spacing:.25em;
  text-transform:uppercase;
  color:var(--prog-accent, var(--green));
  display:flex;
  align-items:center;
  gap:.6rem;
  margin-bottom:1rem;
}
.det-eyebrow::before{ content:''; display:none }

.det-badge{
  display:inline-flex;
  align-items:center;
  gap:.6rem;
  font-family:var(--ff-mono);
  font-size:.65rem;          /* más grande */
  letter-spacing:.15em;
  text-transform:uppercase;
  padding:.4rem 1rem;
  margin-bottom:1.5rem;
  border:1px solid var(--prog-badge-border, rgba(0,0,0,.15));
  background:var(--prog-badge-bg, rgba(0,0,0,.04));
  color:var(--prog-accent, #111);
  align-self:flex-start;
}
.det-badge-dot{ display:none }  /* elimina la barrita/dot */

.det-title{
  font-family:var(--ff-display);
  font-weight:900;
  font-style:italic;
  font-size:clamp(5rem,11vw,12rem);  /* más grande */
  text-transform:uppercase;
  letter-spacing:-.02em;
  line-height:.85;
  color:transparent;
  -webkit-text-stroke:3px var(--prog-accent, var(--black));  /* trazo más grueso */
  text-shadow:none;
  margin-bottom:1.5rem;
  display:flex;
  align-items:baseline;
  gap:1.5rem;
  flex-wrap:wrap;
}

.det-popular{
  display:inline-flex;
  align-items:center;
  gap:.6rem;
  font-family:var(--ff-mono);
  font-size:.62rem;           /* más grande */
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--black);         /* texto negro sobre fondo verde */
  background:var(--green);    /* relleno sólido — no outline */
  border:none;
  padding:.35rem 1rem;
  font-style:normal;
  box-shadow:0 0 16px rgba(0,255,136,.35);
}
.det-popular::before{
  content:'';
  width:5px;
  height:5px;
  background:var(--green);
  border-radius:50%;
  display:inline-block;
  animation:blink 1.2s infinite;
}

.det-tagline{
  display:none; /* eliminado del header — el contenido está en el body */
}

/* Precio */
.det-price-block{
  display:flex;
  align-items:flex-end;
  gap:1rem;
  margin-top:2.5rem;
  padding-top:2.5rem;
  border-top:1px solid #161616;
}
.det-price{
  font-family:var(--ff-display);
  font-weight:900;
  font-size:clamp(3.5rem,7vw,6rem);
  color:var(--white);
  line-height:1;
}
.det-price-meta{
  display:flex;
  flex-direction:column;
  gap:.2rem;
  padding-bottom:.4rem;
}
.det-price-period{
  font-family:var(--ff-mono);
  font-size:.6rem;
  letter-spacing:.12em;
  color:var(--muted);
  text-transform:uppercase;
}
.det-price-note{
  font-family:var(--ff-mono);
  font-size:.52rem;
  letter-spacing:.1em;
  color:var(--prog-accent-dim, rgba(255,255,255,.15));
  text-transform:uppercase;
}

/* CTAs */
.det-cta-row{
  display:flex;
  align-items:center;
  gap:1.2rem;
  margin-top:2rem;
  flex-wrap:wrap;
}
.det-cta-note{
  font-family:var(--ff-mono);
  font-size:.52rem;
  letter-spacing:.12em;
  color:var(--muted);
  text-transform:uppercase;
  margin-top:1rem;
}

/* CTA violeta para ELITE */
.btn-elite{
  font-family:var(--ff-display);
  font-size:.75rem;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  background:transparent;
  color:var(--violet);
  padding:.75rem 2.2rem;
  display:inline-block;
  border:1px solid var(--violet);
  transition:all .25s;
  box-shadow:0 0 16px rgba(191,95,255,.15);
  clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);
}
.btn-elite:hover{
  background:rgba(191,95,255,.12);
  box-shadow:0 0 30px rgba(191,95,255,.35);
  transform:translateX(3px);
}

/* ══════════════════════════════
   BODY — grid 2 columnas
══════════════════════════════ */
.det-body{
  display:grid;
  grid-template-columns:1fr 380px;
  gap:1px;
  background:#111;
  border-bottom:1px solid #111;
}
.det-main{
  padding:4rem 3rem;
  background:var(--black);
}
.det-aside{
  padding:3rem 2.5rem;
  background:#080808;
  border-left:1px solid #111;
}

/* ══════════════════════════════
   SECCIONES
══════════════════════════════ */
.det-section{ margin-bottom:4rem }
.det-section:last-child{ margin-bottom:0 }

.det-section-label{
  font-family:var(--ff-mono);
  font-size:.55rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--prog-accent, var(--green));
  display:flex;
  align-items:center;
  gap:.5rem;
  margin-bottom:1.8rem;
}
.det-section-label::before{ content:'//'; color:var(--violet) }

.det-section-title{
  font-family:var(--ff-display);
  font-weight:800;
  font-size:1.6rem;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:var(--white);
  margin-bottom:1.2rem;
}

/* ══════════════════════════════
   TIMELINE
══════════════════════════════ */
.det-timeline{
  display:flex;
  flex-direction:column;
  position:relative;
}
.det-timeline::before{
  content:'';
  position:absolute;
  left:18px;
  top:0;
  bottom:0;
  width:1px;
  background:linear-gradient(to bottom, var(--prog-accent, var(--green)), var(--violet), transparent);
}
.det-tl-item{
  display:grid;
  grid-template-columns:40px 1fr;
  gap:1.5rem;
  padding:1.5rem 0;
  border-bottom:1px solid #0f0f0f;
}
.det-tl-item:last-child{ border-bottom:none }
.det-tl-num{
  width:36px;
  height:36px;
  border:1px solid #1e1e1e;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--ff-mono);
  font-size:.55rem;
  color:var(--prog-accent, var(--green));
  background:var(--black);
  position:relative;
  z-index:1;
  flex-shrink:0;
  transition:all .3s;
}
.det-tl-item:hover .det-tl-num{
  border-color:var(--prog-accent, var(--green));
  box-shadow:0 0 12px var(--prog-glow, rgba(0,255,136,.2));
}
.det-tl-week{
  font-family:var(--ff-mono);
  font-size:.5rem;
  letter-spacing:.15em;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:.4rem;
}
.det-tl-name{
  font-family:var(--ff-display);
  font-weight:700;
  font-size:1rem;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--white);
  margin-bottom:.4rem;
}
.det-tl-desc{
  font-size:.82rem;
  color:#555;
  font-weight:300;
  line-height:1.6;
}

/* ══════════════════════════════
   REQUISITOS
══════════════════════════════ */
.det-req-item{
  display:flex;
  align-items:flex-start;
  gap:.8rem;
  font-size:.88rem;
  color:#666;
  font-weight:300;
  line-height:1.5;
  padding:.55rem 0;
  border-bottom:1px solid #0f0f0f;
}
.det-req-item:last-child{ border-bottom:none }
.det-req-icon{
  color:var(--prog-accent, var(--green));
  font-size:.6rem;
  flex-shrink:0;
  margin-top:.2rem;
  font-family:var(--ff-mono);
}

.det-req-note{
  margin-top:2rem;
  padding:1.5rem;
  border:1px solid var(--prog-border-subtle, #141414);
  background:var(--prog-bg-subtle, #080808);
}
.det-req-note-label{
  font-family:var(--ff-mono);
  font-size:.5rem;
  letter-spacing:.2em;
  color:var(--prog-accent, var(--green));
  text-transform:uppercase;
  margin-bottom:.8rem;
}
.det-req-note p{
  font-size:.85rem;
  color:#555;
  font-weight:300;
  line-height:1.7;
}

/* ══════════════════════════════
   ASIDE
══════════════════════════════ */
.det-includes-title{
  font-family:var(--ff-display);
  font-weight:800;
  font-size:1rem;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--white);
  margin-bottom:1.5rem;
  padding-bottom:1rem;
  border-bottom:1px solid #161616;
}
.det-include-item{
  display:flex;
  align-items:flex-start;
  gap:.8rem;
  padding:.85rem 0;
  border-bottom:1px solid #0f0f0f;
  font-size:.85rem;
  color:#777;
  font-weight:300;
  line-height:1.5;
}
.det-include-item:last-child{ border-bottom:none }
.det-include-arrow{
  color:var(--prog-accent, var(--green));
  font-size:.6rem;
  flex-shrink:0;
  margin-top:.2rem;
  font-family:var(--ff-mono);
}

/* Barras de nivel */
.det-level-wrap{
  margin-top:2rem;
  padding-top:2rem;
  border-top:1px solid #161616;
}
.det-level-label{
  font-family:var(--ff-mono);
  font-size:.5rem;
  letter-spacing:.18em;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:.8rem;
}
.det-bars{ display:flex; gap:5px }
.det-bar{
  width:10px;
  height:26px;
  transform:skewX(-16deg);
}
.det-bar.on{
  background:var(--prog-accent, var(--white));
  box-shadow:0 0 6px var(--prog-glow, rgba(255,255,255,.3));
}
.det-bar.off{ background:var(--prog-bar-off, rgba(255,255,255,.08)) }

/* Precio en aside */
.det-aside-price{
  margin-top:2.5rem;
  padding-top:2rem;
  border-top:1px solid #161616;
}
.det-aside-price-num{
  font-family:var(--ff-display);
  font-weight:900;
  font-size:3rem;
  color:var(--white);
  line-height:1;
}
.det-aside-price-period{
  font-family:var(--ff-mono);
  font-size:.55rem;
  letter-spacing:.12em;
  color:var(--muted);
  text-transform:uppercase;
  margin-top:.4rem;
}

/* Otros programas en aside */
.det-other-programs{
  margin-top:2.5rem;
  padding-top:2rem;
  border-top:1px solid #161616;
}
.det-other-label{
  font-family:var(--ff-mono);
  font-size:.5rem;
  letter-spacing:.18em;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:1rem;
}
.det-other-link{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:.8rem 0;
  border-bottom:1px solid #0f0f0f;
  font-family:var(--ff-display);
  font-size:.9rem;
  font-weight:700;
  text-transform:uppercase;
  color:#3a3a3a;
  letter-spacing:.05em;
  transition:color .2s;
}
.det-other-link:last-child{ border-bottom:none }
.det-other-link:hover{ color:var(--white) }
.det-other-link-price{
  font-family:var(--ff-mono);
  font-size:.55rem;
}

/* ══════════════════════════════
   FOOTER
══════════════════════════════ */
.det-footer{
  padding:3rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:1rem;
  border-top:1px solid #111;
}
.det-footer-logo{
  font-family:var(--ff-display);
  font-weight:900;
  font-size:1.2rem;
  letter-spacing:.08em;
  color:var(--green);
  text-shadow:0 0 16px rgba(0,255,136,.3);
}
.det-footer-nav{
  display:flex;
  gap:1.5rem;
  align-items:center;
  flex-wrap:wrap;
}
.det-footer-nav span{
  font-family:var(--ff-mono);
  font-size:.5rem;
  letter-spacing:.12em;
  color:var(--muted);
  text-transform:uppercase;
}
.det-footer-nav a{
  font-family:var(--ff-mono);
  font-size:.55rem;
  letter-spacing:.12em;
  color:var(--muted);
  text-transform:uppercase;
  transition:color .2s;
}
.det-footer-nav a:hover{ color:var(--white) }

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
/* ══════════════════════════════
   SECCIÓN PRECIO + CARRUSEL
══════════════════════════════ */
.det-precio-band{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:#111;
  border-bottom:1px solid #111;
}
.det-precio-left{
  background:var(--black);
  padding:4rem 3rem;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:0;
}
/* Carrusel */
.det-carousel-wrap{
  background:#080808;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.det-carousel{
  overflow:hidden;
  flex:1;
}
.det-carousel-track{
  display:flex;
  height:100%;
  transition:transform .6s cubic-bezier(.25,.8,.25,1);
  will-change:transform;
}
.det-carousel-slide{
  flex:0 0 100%;
  width:100%;
  height:100%;
  min-height:360px;
  overflow:hidden;
  position:relative;
}
.det-carousel-slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  filter:saturate(.85) brightness(.88);
  transition:transform .6s ease;
}
.det-carousel-slide:hover img{ transform:scale(1.03) }
/* Overlay sutil en cada slide */
.det-carousel-slide::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, transparent 60%, rgba(5,5,5,.6) 100%);
  pointer-events:none;
}
/* Dots */
.det-carousel-dots{
  display:flex;
  justify-content:center;
  gap:.6rem;
  padding:.9rem 0;
  background:#080808;
  border-top:1px solid #111;
}
.det-cdot{
  width:7px;
  height:7px;
  border-radius:50%;
  border:none;
  background:var(--muted2);
  padding:0;
  cursor:pointer;
  transition:background .25s, transform .25s, box-shadow .25s;
}
.det-cdot.active{
  background:var(--prog-accent, var(--green));
  transform:scale(1.4);
  box-shadow:0 0 8px var(--prog-glow, rgba(0,255,136,.55));
}

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
@media(max-width:1200px){
  .det-header{ grid-template-columns:1fr 420px; gap:2.5rem }
}
@media(max-width:1000px){
  .det-header{ grid-template-columns:1fr 340px; gap:2rem }
}
@media(max-width:900px){
  .det-header{ grid-template-columns:1fr; gap:2.5rem; padding:3rem 2rem 2.5rem }
  .det-header-img{ max-width:520px }
  .det-precio-band{ grid-template-columns:1fr }
  .det-precio-left{ padding:3rem 2rem }
  .det-carousel-slide{ min-height:280px }
  .det-body{ grid-template-columns:1fr }
  .det-aside{ border-left:none; border-top:1px solid #111 }
  .det-main{ padding:3rem 2rem }
  .det-aside{ padding:2.5rem 2rem }
  .det-footer{ padding:2rem }
}
@media(max-width:480px){
  .det-header,.det-main,.det-aside,.det-precio-left{ padding:2.5rem 1.5rem }
  .det-header-img{ display:none }
  .det-footer{ padding:1.5rem }
  .det-cta-row{ flex-direction:column; align-items:flex-start }
  .btn-primary,.btn-ghost,.btn-elite{ width:100%; text-align:center; justify-content:center; display:block }
  .det-title{ font-size:clamp(3.5rem,16vw,6rem) }
  .det-carousel-slide{ min-height:220px }
}
</style>
</head>
<body>

<!-- CURSOR -->
<div id="cursor" aria-hidden="true"></div>
<div id="cursor-ring" aria-hidden="true"></div>
<!-- SCANLINES -->
<div class="scanlines" aria-hidden="true"></div>

<!-- ═══════ NAV ═══════ -->
<nav>
  <div class="nav-logo">APEX<span class="dot">.</span></div>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html#experiencias">Experiencias</a></li>
    <li><a href="index.html#programas">Programas</a></li>
    <li><a href="index.html#tecnologia">Simuladores</a></li>
    <li><a href="index.html#academia">Academia</a></li>

/* ══════════════════════════════
   CARRUSEL AUTOMÁTICO
══════════════════════════════ */
(function(){
  const track  = document.getElementById('det-carousel-track');
  const dots   = document.querySelectorAll('.det-cdot');
  if(!track || !dots.length) return;

  const total    = 3;
  let current    = 0;
  let autoTimer  = null;

  function goTo(idx){
    current = (idx + total) % total;
    track.style.transform = 'translateX(-' + (current * 100) + '%)';
    dots.forEach((d, i) => d.classList.toggle('active', i === current));
  }

  function next(){ goTo(current + 1); }

  function startAuto(){ autoTimer = setInterval(next, 3500); }
  function stopAuto(){  clearInterval(autoTimer); }

  // Dots manuales
  dots.forEach(d => {
    d.addEventListener('click', () => {
      stopAuto();
      goTo(parseInt(d.dataset.idx));
      startAuto();
    });
  });

  // Swipe táctil
  let touchX = 0;
  track.parentElement.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive:true });
  track.parentElement.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if(Math.abs(dx) > 40){ stopAuto(); goTo(dx < 0 ? current+1 : current-1); startAuto(); }
  });

  startAuto();
})();

/* ── HUD speed flicker ── */
(function(){
  const el = document.getElementById('hud-speed');
  if(!el) return;
  function flicker(){
    const v = 248 + Math.floor(Math.random() * 50);
    el.textContent = v + ' km/h';
    setTimeout(flicker, 500 + Math.random() * 400);
  }
  flicker();
})();

/* ══════════════════════════════
   CURSOR + NAV
══════════════════════════════ */
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursor-ring');
let mx=0, my=0, rx=0, ry=0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx+'px'; cursor.style.top = my+'px';
});
(function loop(){
  rx += (mx-rx)*.1; ry += (my-ry)*.1;
  ring.style.left = rx+'px'; ring.style.top = ry+'px';
  requestAnimationFrame(loop);
})();
document.addEventListener('mouseleave', () => { cursor.style.opacity='0'; ring.style.opacity='0'; });
document.addEventListener('mouseenter', () => { cursor.style.opacity='1'; ring.style.opacity='1'; });

const navToggle = document.getElementById('nav-toggle');
const navLinks  = document.getElementById('nav-links');
if(navToggle && navLinks){
  navToggle.addEventListener('click', () => {
    const o = navLinks.classList.toggle('open');
    navToggle.classList.toggle('open', o);
    navToggle.setAttribute('aria-expanded', o);
  });
  navLinks.querySelectorAll('a').forEach(l => l.addEventListener('click', () => {
    navLinks.classList.remove('open');
    navToggle.classList.remove('open');
    navToggle.setAttribute('aria-expanded', 'false');
  }));
}
</script>
